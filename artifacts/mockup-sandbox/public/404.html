<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
  </head>
  <body>
    <script>
      // GitHub Pages serves 404.html for unknown routes.
      // Save the attempted URL and redirect to the SPA entry.
      sessionStorage.setItem("gh-pages:redirect", window.location.pathname + window.location.search + window.location.hash);
      window.location.replace("./");
    </script>
  </body>
</html>
